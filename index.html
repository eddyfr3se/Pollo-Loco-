<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="models/drawable-object.class.js"></script>
    <script src="models/movable-object.class.js"></script>
    <script src="models/character.class.js"></script>
    <script src="models/chicken.class.js"></script>
    <script src="models/chicken-small.class.js"></script>
    <script src="models/cloud.class.js"></script>
    <script src="models/coin.class.js"></script>
    <script src="models/bottle.class.js"></script>
    <script src="models/throwable-object.class.js"></script>
    <script src="models/status-bar.class.js"></script>
    <script src="models/status-bar-coin.class.js"></script>
    <script src="models/status-bar-bottle.class.js"></script>
    <script src="models/status-bar-endboss.class.js"></script>
    <script src="models/world.class.js"></script>
    <script src="models/background-object.class.js"></script>
    <script src="models/keyboard.class.js"></script>
    <script src="models/level.class.js"></script>
    <script src="models/endboss.class.js"></script>
    <script src="levels/level1.js"></script>
    <script src="js/game.js"></script>
    <title>EL Pollo De Loco</title>
</head>

<body onload="init()">

    <div id="turnDeviceScreen" class="turn-device">
        <p>Please rotate your device to landscape mode to play.</p>
    </div>

    <div id="gameContainer" class="game-container">
        <canvas id="canvas" width="720" height="480"></canvas>

        <div id="mobileControls" class="mobile-controls">
            <div class="left-controls">
                <button id="btnLeft" class="mobile-btn">◀</button>
                <button id="btnRight" class="mobile-btn">▶</button>
            </div>
            <div class="right-controls">
                <button id="btnJump" class="mobile-btn">▲</button>
                <button id="btnThrow" class="mobile-btn">Space</button>
            </div>
        </div>

        <div id="gameOverlay">
            <button class="overlay-btn" id="soundBtn" onclick="toggleSound()" title="Sound On/Off">🔊</button>
            <button class="overlay-btn" id="fullscreenBtn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
        </div>
        <div id="startScreen">
            <img src="img/9_intro_outro_screens/start/startbildschirm.png" alt="Start Logo">
            <div class="button-container">
                <button class="btn" onclick="startGame()">START GAME</button>
                <button class="btn btn-secondary" onclick="openInstructions()">CONTROLS</button>
            </div>
        </div>

        <div id="instructionsPanel">
            <h2>How to play El Pollo Loco:</h2>
            <div class="keys">
                <p><span>◀ / ▶</span> Move</p>
                <p><span>▲</span> Jump</p>
                <p><span>Space</span> Throw bottle</p>
            </div>
            <p class="instructions-desc">Collect bottles and coins, and defeat the boss!
            </p>
            <button class="btn btn-secondary back-btn" onclick="closeInstructions()">BACK</button>
        </div>

        <div id="endScreen">
            <img id="endScreenImage" src="" alt="End Screen">
            <div class="button-container">
                <button class="btn" onclick="restartGame()">RESTART</button>
                <button class="btn btn-secondary" onclick="goToHome()">HOME</button>
            </div>
        </div>
    </div>
    <a href="impressum.html" class="impressum-btn">Impressum</a>
</body>

</html>
